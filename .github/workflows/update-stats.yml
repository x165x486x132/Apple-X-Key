name: 📊 Update Discord Member Stats

on:
  schedule:
    # Met à jour toutes les heures à la minute 0 (00:00, 01:00, 02:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # Permet de le lancer manuellement avec le bouton

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Update Voice Channel Name
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import requests

          BOT_TOKEN = os.environ.get("BOT_TOKEN")
          GUILD_ID = os.environ.get("GUILD_ID")
          CHANNEL_ID = os.environ.get("CHANNEL_ID")

          if not all([BOT_TOKEN, GUILD_ID, CHANNEL_ID]):
              print("❌ Missing Secrets! Make sure BOT_TOKEN, GUILD_ID, and CHANNEL_ID are set.")
              sys.exit(1)

          headers = {
              "Authorization": f"Bot {BOT_TOKEN}",
              "Content-Type": "application/json"
          }

          # 1. Fetch server member count
          print("🔍 Fetching member count...")
          guild_url = f"https://discord.com/api/v10/guilds/{GUILD_ID}?with_counts=true"
          resp = requests.get(guild_url, headers=headers)
          
          if not resp.ok:
              print(f"❌ Failed to fetch guild info: {resp.text}")
              sys.exit(1)

          member_count = resp.json().get("approximate_member_count")
          if not member_count:
              print("❌ Could not read approximate_member_count")
              sys.exit(1)

          print(f"👥 Found {member_count} members.")

          # 2. Rename the voice channel
          print("✏️ Updating channel name...")
          channel_url = f"https://discord.com/api/v10/channels/{CHANNEL_ID}"
          payload = {
              "name": f"👥 Members: {member_count}"
          }
          
          patch_resp = requests.patch(channel_url, headers=headers, json=payload)
          
          if patch_resp.ok:
              print(f"✅ Success! Channel renamed to '👥 Members: {member_count}'")
          else:
              print(f"❌ Failed to rename channel: {patch_resp.text}")
              sys.exit(1)
          EOF
