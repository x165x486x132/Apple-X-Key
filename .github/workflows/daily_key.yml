name: 🍏 Apple X — Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'      # Midnight UTC — generates a new key
    - cron: '15,45 * * * *'  # Every 30 min (:15 and :45) — refreshes the embed
  workflow_dispatch:
    inputs:
      mode:
        description: 'Action to perform'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate   # Generate a new key + update embed
          - refresh    # Only refresh the embed (keep current key)

permissions:
  contents: write

jobs:
  generate-key:
    name: Generate & Broadcast Daily Key
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect mode from schedule
        id: detect-mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MINUTE=$(date -u +"%M")
            HOUR=$(date -u +"%H")
            if [ "$HOUR" = "00" ] && [ "$MINUTE" = "00" ]; then
              echo "mode=generate" >> $GITHUB_OUTPUT
            else
              echo "mode=refresh" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'generate' }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Key & Edit Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MODE: ${{ steps.detect-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import random
          import string
          import requests
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          mode = os.environ.get("MODE", "generate")
          print(f"▶️  Mode: {mode}")

          # ── Key: generate new or reuse existing ───────────────────────
          CHARSET = string.ascii_uppercase + string.digits

          if mode == "refresh":
              try:
                  with open("key.txt", "r") as f:
                      daily_key = f.read().strip()
                  print(f"🔁 Reusing existing key: {daily_key}")
              except FileNotFoundError:
                  print("❌ key.txt not found — cannot refresh, run 'generate' first.", file=sys.stderr)
                  sys.exit(1)
          else:
              random_part = ''.join(random.SystemRandom().choices(CHARSET, k=13))
              daily_key = f"APPLEX{random_part}"
              with open("key.txt", "w") as f:
                  f.write(daily_key)
              print(f"✅ New key generated: {daily_key}")

          # ── UTC timestamps ────────────────────────────────────────────
          now_utc = datetime.now(timezone.utc)
          date_str = now_utc.strftime("%A, %B %d %Y")
          time_str = now_utc.strftime("%H:%M UTC")

          # Next midnight UTC as Unix timestamp (for Discord dynamic timestamp)
          next_midnight = (now_utc + timedelta(days=1)).replace(
              hour=0, minute=0, second=0, microsecond=0
          )
          expire_unix = int(next_midnight.timestamp())

          # ── Parse webhook URL ─────────────────────────────────────────
          webhook_url = os.environ.get("WEBHOOK_URL")
          if not webhook_url:
              print("❌ WEBHOOK_URL is missing", file=sys.stderr)
              sys.exit(1)

          parts         = webhook_url.rstrip("/").split("/")
          webhook_token = parts[-1]
          webhook_id    = parts[-2]

          MESSAGE_ID = "1504920316219097160"
          edit_url   = f"https://discord.com/api/webhooks/{webhook_id}/{webhook_token}/messages/{MESSAGE_ID}"

          # ── Build embed ───────────────────────────────────────────────
          payload = {
              "username": "Apple X | KEY",
              "embeds": [{
                  "author": {
                      "name": "Apple X — Security System"
                  },
                  "title": "🔑  Daily Access Key",
                  "description": (
                      f"Your key for **{date_str}**\n"
                      f"```\n{daily_key}\n```"
                  ),
                  "color": 0x57F287,
                  "fields": [
                      {
                          "name": "🕛  Resets at",
                          "value": "Every day at **00:00 UTC**",
                          "inline": True
                      },
                      {
                          "name": "📅  Valid until",
                          # <t:UNIX:R> = live relative countdown ("in 14 hours")
                          # <t:UNIX:F> = full date display
                          "value": f"<t:{expire_unix}:F>\n<t:{expire_unix}:R>",
                          "inline": True
                      },
                      {
                          "name": "\u200b",
                          "value": (
                              "> ⚠️  **Do not share this key.**\n"
                              "> Come back daily to keep your access."
                          ),
                          "inline": False
                      }
                  ],
                  "footer": {
                      "text": f"{'Refreshed' if mode == 'refresh' else 'Generated'} at {time_str}  ·  Apple X"
                  },
                  "timestamp": now_utc.isoformat()
              }]
          }

          # ── PATCH the existing message ────────────────────────────────
          response = requests.patch(edit_url, json=payload, timeout=10)
          response.raise_for_status()
          print(f"✅ Discord embed updated (status {response.status_code})")
          EOF

      - name: Commit & Push key.txt
        if: ${{ steps.detect-mode.outputs.mode != 'refresh' }}
        run: |
          git config --global user.name  "Apple X Bot"
          git config --global user.email "bot@applex.com"
          git add key.txt
          git diff --cached --quiet && echo "⚠️ No changes to commit" && exit 0
          git commit -m "chore: update daily key [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
