name: 🍏 Apple X — Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Action to perform'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate    # New key + update embed
          - refresh     # Refresh embed only (keep current key)
          - new-embed   # Send a new message, delete the old one, save new ID

permissions:
  contents: write

jobs:
  generate-key:
    name: Generate & Broadcast Daily Key
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect mode from schedule
        id: detect-mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +"%H")
            MINUTE=$(date -u +"%M")
            if [ "$HOUR" = "00" ] && [ "$MINUTE" = "00" ]; then
              echo "mode=generate" >> $GITHUB_OUTPUT
            else
              echo "mode=refresh" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'generate' }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Key & Edit Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MODE: ${{ steps.detect-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import random
          import string
          import requests
          import os
          import sys
          import base64
          from datetime import datetime, timezone, timedelta

          mode = os.environ.get("MODE", "generate")
          print(f"▶️  Mode: {mode}")

          # ── MOT DE PASSE SECRET
          SECRET_PASSWORD = "AppleX_Secret_2026!"
          CHARSET = string.ascii_uppercase + string.digits

          def encrypt_xor(text, key):
              encrypted = bytearray()
              for i in range(len(text)):
                  char_code = ord(text[i])
                  key_code = ord(key[i % len(key)])
                  encrypted.append(char_code ^ key_code)
              return encrypted

          def decrypt_xor(data_bytes, key):
              decrypted = []
              for i in range(len(data_bytes)):
                  byte_val = data_bytes[i]
                  key_code = ord(key[i % len(key)])
                  decrypted.append(chr(byte_val ^ key_code))
              return "".join(decrypted)

          if mode == "refresh" or mode == "new-embed":
              try:
                  with open("key.txt", "r") as f:
                      obfuscated_key = f.read().strip()
                  
                  # Sécurité : On vérifie si le décryptage donne bien "APPLEX..."
                  try:
                      xor_bytes = base64.b64decode(obfuscated_key)
                      test_key = decrypt_xor(xor_bytes, SECRET_PASSWORD)
                      
                      if test_key.startswith("APPLEX"):
                          daily_key = test_key
                      else:
                          # Si ça donne n'importe quoi, c'est que c'était l'ancienne méthode Base64
                          daily_key = xor_bytes.decode('utf-8')
                  except Exception:
                      daily_key = obfuscated_key
                      
                  print(f"🔁 Reusing existing key (decoded for Discord): {daily_key}")
              except FileNotFoundError:
                  print("❌ key.txt not found — run 'generate' first.", file=sys.stderr)
                  sys.exit(1)
          else:
              random_part = ''.join(random.SystemRandom().choices(CHARSET, k=13))
              daily_key = f"APPLEX{random_part}"
              
              xor_encrypted = encrypt_xor(daily_key, SECRET_PASSWORD)
              obfuscated_key = base64.b64encode(xor_encrypted).decode('utf-8')
              
              with open("key.txt", "w") as f:
                  f.write(obfuscated_key)
              print(f"✅ New key generated & encrypted in file")

          # ── UTC timestamps ────────────────────────────────────────────
          now_utc = datetime.now(timezone.utc)
          time_str = now_utc.strftime("%H:%M UTC")

          next_midnight = (now_utc + timedelta(days=1)).replace(
              hour=0, minute=0, second=0, microsecond=0
          )
          expire_str = next_midnight.strftime("%B %d, %Y at 00:00 UTC")
          hours_left = int((next_midnight - now_utc).total_seconds() // 3600)
          mins_left  = int(((next_midnight - now_utc).total_seconds() % 3600) // 60)
          time_left  = f"{hours_left}h {mins_left:02d}m remaining"

          # ── Parse webhook URL ─────────────────────────────────────────
          webhook_url = os.environ.get("WEBHOOK_URL")
          if not webhook_url:
              print("❌ WEBHOOK_URL is missing", file=sys.stderr)
              sys.exit(1)

          parts         = webhook_url.rstrip("/").split("/")
          webhook_token = parts[-1]
          webhook_id    = parts[-2]

          base_url = f"https://discord.com/api/webhooks/{webhook_id}/{webhook_token}"

          # ── Read current message ID from file ─────────────────────────
          try:
              with open("message_id.txt", "r") as f:
                  message_id = f.read().strip()
              print(f"📌 Current message ID: {message_id}")
          except FileNotFoundError:
              message_id = None

          # ── Build embed payload ───────────────────────────────────────
          embed_payload = {
              "username": "Apple X | KEY",
              "embeds": [{
                  "author": {
                      "name": "Apple X — Security System"
                  },
                  "title": "🔑  Daily Access Key",
                  "description": (
                      f"-# {now_utc.strftime('%A, %B %d %Y')}\n"
                      f"```fix\n{daily_key}\n```\n"
                      f"-# ⚠️  Do not share this key — Come back daily to keep your access."
                  ),
                  "color": 0x57F287,
                  "fields": [
                      {
                          "name": "📅  Expires on",
                          "value": f"**{expire_str}**",
                          "inline": True
                      },
                      {
                          "name": "⏳  Time left",
                          "value": f"**{time_left}**",
                          "inline": True
                      }
                  ],
                  "footer": {
                      "text": f"{'Refreshed' if mode == 'refresh' else 'Generated'} at {time_str}  ·  Apple X"
                  }
              }]
          }

          # ── new-embed: POST new message, DELETE old one ───────────────
