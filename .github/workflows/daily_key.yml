name: Daily Key Gen

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - new-embed
          - encrypt-current

permissions:
  contents: write

jobs:
  update-key:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup dependencies
        run: pip install -q requests

      - name: Parse run mode
        id: parse-mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=generate" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode || 'generate' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run key generation script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          KEY_CHANNEL_ID: ${{ secrets.KEY_CHANNEL_ID }}
          SECRET_PASSWORD: ${{ secrets.SECRET_PASSWORD }}
          RUN_MODE: ${{ steps.parse-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import base64, os, random, string, sys, requests
          from datetime import datetime, timezone, timedelta

          mode = os.environ.get("RUN_MODE", "generate")
          secret = os.environ.get("SECRET_PASSWORD")
          bot_token = os.environ.get("BOT_TOKEN")
          channel_id = os.environ.get("KEY_CHANNEL_ID")

          if not secret:
              sys.exit("Error: Missing secret password in environment.")
          if not bot_token or not channel_id:
              sys.exit("Error: BOT_TOKEN or KEY_CHANNEL_ID is missing. Check your GitHub Secrets.")

          def xor_cipher(text, key):
              return bytes([ord(c) ^ ord(key[i % len(key)]) for i, c in enumerate(text)])

          def xor_decipher(data, key):
              return "".join([chr(b ^ ord(key[i % len(key)])) for i, b in enumerate(data)])

          if mode == "encrypt-current":
              if not os.path.exists("key.txt"):
                  sys.exit("Error: key.txt not found.")
                  
              with open("key.txt", "r") as f:
                  current_val = f.read().strip()
                  
              if current_val.startswith("APPLEX"):
                  encoded = base64.b64encode(xor_cipher(current_val, secret)).decode('utf-8')
                  with open("key.txt", "w") as f:
                      f.write(encoded)
              sys.exit(0)

          daily_key = ""
          
          if mode == "new-embed":
              try:
                  with open("key.txt", "r") as f:
                      raw_data = f.read().strip()
                  try:
                      decoded_key = xor_decipher(base64.b64decode(raw_data), secret)
                      daily_key = decoded_key if decoded_key.startswith("APPLEX") else raw_data
                  except:
                      daily_key = raw_data
              except FileNotFoundError:
                  sys.exit("Error: key.txt not found.")
          else:
              chars = string.ascii_uppercase + string.digits
              rnd_str = ''.join(random.SystemRandom().choices(chars, k=13))
              daily_key = f"APPLEX{rnd_str}"
              
              encoded = base64.b64encode(xor_cipher(daily_key, secret)).decode('utf-8')
              with open("key.txt", "w") as f:
                  f.write(encoded)

          headers = {
              "Authorization": f"Bot {bot_token}",
              "Content-Type": "application/json"
          }
          base_url = f"https://discord.com/api/v10/channels/{channel_id}/messages"

          msg_id = None
          if os.path.exists("message_id.txt"):
              with open("message_id.txt", "r") as f:
                  msg_id = f.read().strip()

          if mode == "generate":
              try:
                  ping_res = requests.post(
                      base_url, 
                      json={"content": "<@&1498644211858411663>"},
                      headers=headers,
                      timeout=10
                  )
                  if ping_res.ok:
                      requests.delete(f"{base_url}/{ping_res.json()['id']}", headers=headers, timeout=10)
              except Exception:
                  pass

          now = datetime.now(timezone.utc)
          next_mid = (now + timedelta(days=1)).replace(hour=0, minute=0, second=0, microsecond=0)
          mid_ts = int(next_mid.timestamp())

          img_url = "https://tr.rbxcdn.com/180DAY-35cc236165c857f9747112addef6db71/768/432/Image/Webp/noFilter"

          embed = {
              "author": {"name": "Apple X Security"},
              "title": "Highway Legends — Access Granted",
              "description": (
                  "Your secure access key has been generated for today.\n\n"
                  "-# 💡 **Tip:** Long-press the raw text inside the fields below to copy them perfectly without any extra characters.\n"
                  "-# ⚠️ Do not share your key. Return daily to renew your access."
              ),
              "color": 0x2b2d31,
              "fields": [
                  {
                      "name": "🔑 Daily Key",
                      "value": daily_key,
                      "inline": False
                  },
                  {
                      "name": "📜 Executor Script",
                      "value": "loadstring(game:HttpGet(\"https://raw.githubusercontent.com/Tamachiru/AppleX/refs/heads/main/Game4\"))()",
                      "inline": False
                  },
                  {
                      "name": "⏳ Expiration", 
                      "value": f"<t:{mid_ts}:R> | <t:{mid_ts}:f>", 
                      "inline": False
                  }
              ],
              "image": {"url": img_url},
              "footer": {"text": "Automated Security System"},
              "timestamp": now.isoformat()
          }

          payload = {
              "embeds": [embed],
              "components": [{
                  "type": 1,
                  "components": [
                      {
                          "type": 2,
                          "label": "🎮 Play Game",
                          "style": 5,
                          "url": "https://www.roblox.com/fr/games/15288629078/Highway-Legends"
                      }
                  ]
              }]
          }

          message_sent = False

          if mode != "new-embed" and msg_id:
              r = requests.patch(f"{base_url}/{msg_id}", json=payload, headers=headers, timeout=10)
              if r.ok:
                  message_sent = True
              else:
                  print("Failed to edit the message. It might belong to a webhook or no longer exist.")

          if not message_sent:
              r = requests.post(base_url, json=payload, headers=headers, timeout=10)
              r.raise_for_status()
              new_msg_id = str(r.json()["id"])
              
              if msg_id:
                  del_r = requests.delete(f"{base_url}/{msg_id}", headers=headers, timeout=10)
                  if not del_r.ok:
                      print("Failed to delete the old message. Make sure the bot has the 'Manage Messages' permission.")
                      
              with open("message_id.txt", "w") as f:
                  f.write(new_msg_id)
          EOF

      - name: Commit state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add key.txt message_id.txt 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily key [skip ci]"
            git push
          fi
