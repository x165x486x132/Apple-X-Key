name: 🍏 Apple X — Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Action to perform'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate    # New key + update embed
          - refresh     # Refresh embed only (keep current key)
          - new-embed   # Send a new message, delete the old one, save new ID

permissions:
  contents: write

jobs:
  generate-key:
    name: Generate & Broadcast Daily Key
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect mode from schedule
        id: detect-mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +"%H")
            MINUTE=$(date -u +"%M")
            if [ "$HOUR" = "00" ] && [ "$MINUTE" = "00" ]; then
              echo "mode=generate" >> $GITHUB_OUTPUT
            else
              echo "mode=refresh" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'generate' }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Key & Edit Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MODE: ${{ steps.detect-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import random
          import string
          import requests
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          mode = os.environ.get("MODE", "generate")
          print(f"▶️  Mode: {mode}")

          # ── Key: generate new or reuse existing ───────────────────────
          CHARSET = string.ascii_uppercase + string.digits

          if mode == "refresh" or mode == "new-embed":
              try:
                  with open("key.txt", "r") as f:
                      daily_key = f.read().strip()
                  print(f"🔁 Reusing existing key: {daily_key}")
              except FileNotFoundError:
                  print("❌ key.txt not found — run 'generate' first.", file=sys.stderr)
                  sys.exit(1)
          else:
              random_part = ''.join(random.SystemRandom().choices(CHARSET, k=13))
              daily_key = f"APPLEX{random_part}"
              with open("key.txt", "w") as f:
                  f.write(daily_key)
              print(f"✅ New key generated: {daily_key}")

          # ── UTC timestamps ────────────────────────────────────────────
          now_utc = datetime.now(timezone.utc)
          time_str = now_utc.strftime("%H:%M UTC")

          next_midnight = (now_utc + timedelta(days=1)).replace(
              hour=0, minute=0, second=0, microsecond=0
          )
          expire_str = next_midnight.strftime("%B %d, %Y at 00:00 UTC")
          hours_left = int((next_midnight - now_utc).total_seconds() // 3600)
          mins_left  = int(((next_midnight - now_utc).total_seconds() % 3600) // 60)
          time_left  = f"{hours_left}h {mins_left:02d}m remaining"

          # ── Parse webhook URL ─────────────────────────────────────────
          webhook_url = os.environ.get("WEBHOOK_URL")
          if not webhook_url:
              print("❌ WEBHOOK_URL is missing", file=sys.stderr)
              sys.exit(1)

          parts         = webhook_url.rstrip("/").split("/")
          webhook_token = parts[-1]
          webhook_id    = parts[-2]

          base_url = f"https://discord.com/api/webhooks/{webhook_id}/{webhook_token}"

          # ── Read current message ID from file ─────────────────────────
          try:
              with open("message_id.txt", "r") as f:
                  message_id = f.read().strip()
              print(f"📌 Current message ID: {message_id}")
          except FileNotFoundError:
              message_id = None
              print("⚠️  message_id.txt not found — will create a new message.")

          # ── Build embed payload ───────────────────────────────────────
          embed_payload = {
              "username": "Apple X | KEY",
              "embeds": [{
                  "author": {
                      "name": "Apple X — Security System"
                  },
                  "title": "🔑  Daily Access Key",
                  "description": (
                      f"-# {now_utc.strftime('%A, %B %d %Y')}\n"
                      f"```fix\n{daily_key}\n```\n"
                      f"-# ⚠️  Do not share this key — Come back daily to keep your access."
                  ),
                  "color": 0x57F287,
                  "fields": [
                      {
                          "name": "📅  Expires on",
                          "value": f"**{expire_str}**",
                          "inline": True
                      },
                      {
                          "name": "⏳  Time left",
                          "value": f"**{time_left}**",
                          "inline": True
                      }
                  ],
                  "footer": {
                      "text": f"{'Refreshed' if mode == 'refresh' else 'Generated'} at {time_str}  ·  Apple X"
                  }
              }]
          }

          # ── new-embed: POST new message, DELETE old one ───────────────
          if mode == "new-embed" or message_id is None:
              # 1. Send new message (wait=true returns the message object with its ID)
              response = requests.post(
                  f"{base_url}?wait=true",
                  json=embed_payload,
                  timeout=10
              )
              response.raise_for_status()
              new_message_id = str(response.json()["id"])
              print(f"✅ New message sent — ID: {new_message_id}")

              # 2. Delete old message if we had one
              if message_id:
                  del_response = requests.delete(
                      f"{base_url}/messages/{message_id}",
                      timeout=10
                  )
                  if del_response.status_code == 204:
                      print(f"🗑️  Old message {message_id} deleted")
                  else:
                      print(f"⚠️  Could not delete old message: {del_response.status_code}")

              # 3. Save new message ID to file
              with open("message_id.txt", "w") as f:
                  f.write(new_message_id)
              print(f"💾 Saved new message ID: {new_message_id}")

          # ── generate / refresh: PATCH existing message ────────────────
          else:
              response = requests.patch(
                  f"{base_url}/messages/{message_id}",
                  json=embed_payload,
                  timeout=10
              )
              response.raise_for_status()
              print(f"✅ Discord embed updated (status {response.status_code})")
          EOF

      - name: Commit & Push changes
        if: ${{ steps.detect-mode.outputs.mode != 'refresh' }}
        run: |
          git config --global user.name  "Apple X Bot"
          git config --global user.email "bot@applex.com"
          git add key.txt message_id.txt
          git diff --cached --quiet && echo "⚠️ No changes to commit" && exit 0
          git commit -m "chore: update daily key [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
