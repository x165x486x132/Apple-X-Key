name: 🍏 Apple X — Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC (1AM Paris winter / 2AM Paris summer)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Action to perform'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate   # Generate a new key + update embed
          - refresh    # Only refresh the embed (keep current key)

permissions:
  contents: write

jobs:
  generate-key:
    name: Generate & Broadcast Daily Key
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Key & Edit Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MODE: ${{ github.event.inputs.mode || 'generate' }}
        run: |
          python3 << 'EOF'
          import random
          import string
          import requests
          import os
          import sys
          from datetime import datetime, timezone

          mode = os.environ.get("MODE", "generate")
          print(f"▶️  Mode: {mode}")

          # ── Key: generate new or reuse existing ───────────────────────
          CHARSET = string.ascii_uppercase + string.digits

          if mode == "refresh":
              # Read current key from key.txt
              try:
                  with open("key.txt", "r") as f:
                      daily_key = f.read().strip()
                  print(f"🔁 Reusing existing key: {daily_key}")
              except FileNotFoundError:
                  print("❌ key.txt not found — cannot refresh, run 'generate' first.", file=sys.stderr)
                  sys.exit(1)
          else:
              # Generate a brand new key
              random_part = ''.join(random.SystemRandom().choices(CHARSET, k=13))
              daily_key = f"APPLEX{random_part}"
              with open("key.txt", "w") as f:
                  f.write(daily_key)
              print(f"✅ New key generated: {daily_key}")

          # ── UTC timestamp ─────────────────────────────────────────────
          now_utc = datetime.now(timezone.utc)
          date_str = now_utc.strftime("%A, %B %d %Y")
          expire_str = now_utc.strftime("%m/%d/%Y at 00:00 UTC")

          # ── Parse webhook URL ─────────────────────────────────────────
          webhook_url = os.environ.get("WEBHOOK_URL")
          if not webhook_url:
              print("❌ WEBHOOK_URL is missing", file=sys.stderr)
              sys.exit(1)

          parts = webhook_url.rstrip("/").split("/")
          webhook_token = parts[-1]
          webhook_id    = parts[-2]

          MESSAGE_ID = "1504920316219097160"
          edit_url = f"https://discord.com/api/webhooks/{webhook_id}/{webhook_token}/messages/{MESSAGE_ID}"

          # ── Build embed ───────────────────────────────────────────────
          description = (
              f"Here is your access key for today:\n\n"
              f"# {daily_key}\n\n"
              f"*⚠️ This key expires on **{expire_str}**. "
              f"Check this channel every day to get the new key and keep your access.*"
          )

          payload = {
              "embeds": [{
                  "title": "🍏 Apple X — Daily Access Key",
                  "description": description,
                  "color": 0x000000,
                  "fields": [
                      {
                          "name": "📅 Date",
                          "value": date_str,
                          "inline": True
                      },
                      {
                          "name": "⏰ Generated at",
                          "value": now_utc.strftime("%H:%M UTC"),
                          "inline": True
                      },
                      {
                          "name": "⌛ Expires in",
                          "value": "24 hours",
                          "inline": True
                      }
                  ],
                  "footer": {
                      "text": f"Apple X Premium · {'Embed refreshed' if mode == 'refresh' else 'Automated 24H Security System'} · UTC"
                  },
                  "timestamp": now_utc.isoformat()
              }]
          }

          response = requests.patch(edit_url, json=payload, timeout=10)
          response.raise_for_status()
          print(f"✅ Discord embed updated (status {response.status_code})")
          EOF

      - name: Commit & Push key.txt
        if: ${{ github.event.inputs.mode != 'refresh' }}
        run: |
          git config --global user.name  "Apple X Bot"
          git config --global user.email "bot@applex.com"
          git add key.txt
          git diff --cached --quiet && echo "⚠️ No changes to commit" && exit 0
          git commit -m "chore: update daily key [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
